<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartDoor Admin</title>
<link rel="stylesheet" href="style.css">
<script src="app.js" defer></script>
</head>

<body>

<div class="sidebar">
    <h2>SmartDoor</h2>
    <button onclick="showTab('users')">Users</button>
    <button onclick="showTab('faces')">Faces</button>
    <button onclick="showTab('logs')">Logs</button>
</div>

<div class="main">

<!-- USERS -->
<div id="users" class="tab">
    <h2>Quản lý User</h2>

    <div class="form">
        <input id="code" placeholder="User Code">
        <input id="name" placeholder="Full Name">
        <button onclick="createUser()">Tạo</button>
        <button onclick="updateUser()">Cập nhật</button>
        <button onclick="deleteUser()">Xóa</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Code</th>
                <th>Name</th>
            </tr>
        </thead>
        <tbody id="user_table"></tbody>
    </table>
</div>

<!-- FACE -->
<div id="faces" class="tab" style="display:none;">
    <h2>Quản lý khuôn mặt</h2>

    <select id="face_user"></select>
    <input type="file" id="face_files" multiple>

    <button onclick="registerFace()">Upload</button>
    <button onclick="deleteFace()">Xóa embedding</button>

    <pre id="face_result"></pre>
</div>

<!-- LOG -->
<div id="logs" class="tab" style="display:none;">
    <h2>Lịch sử</h2>
    <button onclick="loadLogs()">Refresh</button>

    <table>
        <thead>
            <tr>
                <th>User</th>
                <th>Method</th>
                <th>Result</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody id="log_table"></tbody>
    </table>
</div>

</div>

</body>
</html>
