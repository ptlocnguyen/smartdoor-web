<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Smart Door</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Đăng ký khuôn mặt</h2>

<input type="text" id="user_code" placeholder="Nhập user_code">
<br><br>

<input type="file" id="files" multiple>
<br><br>

<button onclick="registerFace()">Đăng ký</button>

<p id="register_result"></p>

<hr>

<h2>Test nhận diện</h2>

<input type="file" id="test_file">
<br><br>

<button onclick="recognize()">Nhận diện</button>

<p id="recognize_result"></p>

<script src="app.js"></script>

</body>
</html>
