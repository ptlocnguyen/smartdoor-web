<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SmartDoor Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Smart Door Admin</h1>

<div class="tabs">
    <button onclick="showTab('users')">Users</button>
    <button onclick="showTab('faces')">Faces</button>
    <button onclick="showTab('logs')">Logs</button>
</div>

<!-- USERS -->
<div id="users" class="tab">
    <h2>Quản lý User</h2>

    <input id="new_code" placeholder="User Code">
    <input id="new_name" placeholder="Full Name">
    <button onclick="createUser()">Tạo User</button>

    <ul id="user_list"></ul>
</div>

<!-- FACE -->
<div id="faces" class="tab" style="display:none;">
    <h2>Đăng ký khuôn mặt</h2>

    <select id="face_user"></select>
    <input type="file" id="face_files" multiple>

    <button onclick="registerFace()">Upload Face</button>

    <pre id="face_result"></pre>
</div>

<!-- LOG -->
<div id="logs" class="tab" style="display:none;">
    <h2>Lịch sử</h2>
    <button onclick="loadLogs()">Load Logs</button>

    <table>
        <thead>
            <tr>
                <th>User</th>
                <th>Method</th>
                <th>Result</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody id="log_table"></tbody>
    </table>
</div>

<script src="app.js"></script>
</body>
</html>
